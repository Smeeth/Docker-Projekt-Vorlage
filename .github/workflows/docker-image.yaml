name: Docker Image CI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      
      - name: Convert repository name to lowercase
        run: |
          echo "LOWERCASE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build the Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/${{ env.LOWERCASE_REPO }}:${{ github.sha }} \
            --tag ghcr.io/${{ env.LOWERCASE_REPO }}:latest

      - name: Log in to the Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push the Docker image
        run: |
          docker push ghcr.io/${{ env.LOWERCASE_REPO }}:${{ github.sha }}
          docker push ghcr.io/${{ env.LOWERCASE_REPO }}:latest